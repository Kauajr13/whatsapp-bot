version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  bridge:
    build: ./bridge
    environment:
      - BACKEND_URL=http://backend:8000
      - AUTH_DIR=/app/auth
    volumes:
      - ./auth:/app/auth
    depends_on:
      - backend
    restart: unless-stopped
